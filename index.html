<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JA Solar ESG — Q&amp;A Editor</title>
<style>*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;}
.topbar{background:#1e293b;color:#fff;padding:12px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;flex-wrap:wrap;}
.topbar-title{font-size:16px;font-weight:700;flex:1;}
.sync-status{font-size:12px;padding:3px 12px;border-radius:12px;background:#334155;color:#94a3b8;}
.sync-status.saving{background:#1d4ed8;color:#fff;}
.sync-status.ok{background:#166534;color:#fff;}
.sync-status.error{background:#991b1b;color:#fff;}
.progress-wrap{display:flex;align-items:center;gap:8px;}
.progress-bar-outer{width:120px;height:8px;background:#334155;border-radius:4px;overflow:hidden;}
.progress-bar-inner{height:100%;background:#22c55e;border-radius:4px;transition:width .4s;}
.progress-label{font-size:12px;color:#94a3b8;}
.topbar-btns{display:flex;gap:8px;align-items:center;margin-left:auto;}
.save-note{font-size:11px;color:#94a3b8;}
.tbtn{padding:5px 14px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;color:#fff;}
.tbtn-add{background:#16a34a;}.tbtn-add:hover{background:#15803d;}
.tbtn-save{background:#3b82f6;}.tbtn-save:hover{background:#2563eb;}
.tbtn-save:disabled{background:#334155;color:#64748b;cursor:default;}
.filters{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 28px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;position:sticky;top:57px;z-index:99;}
.filter-label{font-size:12px;color:#64748b;font-weight:600;}
.fbtn{padding:4px 12px;border-radius:16px;border:1px solid #e2e8f0;background:#fff;font-size:12px;cursor:pointer;font-weight:500;}
.fbtn:hover{background:#f8fafc;}
.fbtn.active{background:#1e293b;color:#fff;border-color:#1e293b;}
.fbtn.f-E.active{background:#16a34a;border-color:#16a34a;}
.fbtn.f-S.active{background:#ea580c;border-color:#ea580c;}
.fbtn.f-G.active{background:#1d4ed8;border-color:#1d4ed8;}
.f-pending.active{background:#d97706;border-color:#d97706;}
.f-verified.active{background:#16a34a;border-color:#16a34a;}
.search-box{margin-left:auto;padding:5px 12px;border:1px solid #e2e8f0;border-radius:16px;font-size:13px;width:220px;outline:none;}
.search-box:focus{border-color:#3b82f6;}
.main{padding:20px 28px;max-width:960px;margin:0 auto;}
.cat-header{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;letter-spacing:.5px;margin:18px 0 8px;display:inline-block;}
.cat-E{background:#dcfce7;color:#166634;}
.cat-S{background:#ffedd5;color:#9a3412;}
.cat-G{background:#dbeafe;color:#1e40af;}
.qa-item{background:#fff;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:10px;overflow:hidden;transition:box-shadow .15s;}
.qa-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);}
.qa-header{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;}
.qa-rank{font-size:12px;color:#94a3b8;font-weight:600;min-width:28px;}
.cat-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0;}
.cat-badge.cat-E{background:#dcfce7;color:#166634;}
.cat-badge.cat-S{background:#ffedd5;color:#9a3412;}
.cat-badge.cat-G{background:#dbeafe;color:#1e40af;}
.qa-question{flex:1;font-size:14px;font-weight:500;line-height:1.4;}
.status-btn{flex-shrink:0;padding:3px 10px;border-radius:12px;border:none;font-size:11px;font-weight:600;cursor:pointer;}
.status-btn.ai{background:#fef3c7;color:#92400e;}
.status-btn.verified{background:#dcfce7;color:#166634;}
.delete-btn{display:none;flex-shrink:0;padding:3px 10px;border-radius:6px;border:1px solid #fca5a5;background:#fff5f5;color:#dc2626;font-size:11px;font-weight:600;cursor:pointer;}
.qa-item.open .delete-btn{display:inline-block;}
.qa-body{display:none;padding:0 16px 14px;border-top:1px solid #f1f5f9;}
.qa-item.open .qa-body{display:block;}
.qa-hint{font-size:11px;color:#94a3b8;margin-bottom:6px;padding-top:10px;}
.qa-answer{font-size:13px;line-height:1.65;white-space:pre-wrap;padding:8px 10px;border-radius:6px;border:1px solid transparent;min-height:60px;outline:none;}
.qa-answer:focus{border-color:#3b82f6;background:#f8faff;}
.qa-answer.dirty{border-color:#f59e0b;}
.no-results{text-align:center;padding:60px 0;color:#94a3b8;display:none;}
.hidden{display:none!important;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:12px;padding:28px;width:520px;max-width:95vw;}
.modal-box h3{margin-bottom:16px;font-size:16px;}
.modal-box label{display:block;font-size:13px;font-weight:600;margin:10px 0 4px;}
.modal-box input,.modal-box select,.modal-box textarea{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;font-family:inherit;}
.modal-box textarea{min-height:100px;resize:vertical;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.modal-btns button{padding:7px 18px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
.btn-cancel{background:#f1f5f9;color:#64748b;}
.btn-confirm{background:#16a34a;color:#fff;}</style>
</head>
<body>
<div class="topbar">
  <img src="logo.png" alt="JA Solar" style="height:26px;flex-shrink:0;filter:brightness(0) invert(1);"/>
  <div class="topbar-title">JA Solar ESG &mdash; Q&amp;A Editor</div>
  <span class="sync-status" id="syncStatus">Connecting...</span>
  <div class="progress-wrap">
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div>
    <span class="progress-label" id="progressLabel">0 / 0 verified</span>
  </div>
  <div class="topbar-btns">
    <span class="save-note" id="saveNote"></span>
    <button class="tbtn tbtn-add" onclick="openAddModal()">+ Add Question</button>
    <button class="tbtn tbtn-save" id="saveBtn" disabled onclick="saveData()">Save</button>
  </div>
</div>
<div class="filters">
  <span class="filter-label">Category:</span>
  <button class="fbtn active" data-filter-cat="all" onclick="setCatFilter('all',this)">All</button>
  <button class="fbtn f-E" data-filter-cat="E" onclick="setCatFilter('E',this)">E Environmental</button>
  <button class="fbtn f-S" data-filter-cat="S" onclick="setCatFilter('S',this)">S Social</button>
  <button class="fbtn f-G" data-filter-cat="G" onclick="setCatFilter('G',this)">G Governance</button>
  <span class="filter-label" style="margin-left:12px;">Status:</span>
  <button class="fbtn f-pending" onclick="toggleStatusFilter('pending',this)">Pending</button>
  <button class="fbtn f-verified" onclick="toggleStatusFilter('verified',this)">Verified</button>
  <input class="search-box" type="text" placeholder="Search questions &amp; answers..." oninput="doSearch(this.value)"/>
</div>
<div class="main"></div>
<div class="modal-overlay" id="tokenModal">
  <div class="modal-box">
    <h3>Enter GitHub Token</h3>
    <p style="font-size:13px;color:#64748b;margin-bottom:12px;">Required to load and save data. Stored in your browser only.</p>
    <label>Personal Access Token (repo scope)</label>
    <input type="password" id="tokenInput" placeholder="ghp_..." onkeydown="if(event.key==='Enter')submitToken()"/>
    <div class="modal-btns"><button class="btn-confirm" onclick="submitToken()">Connect</button></div>
  </div>
</div>
<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <h3>Add New Question</h3>
    <label>Category</label>
    <select id="newCat">
      <option value="E">E &mdash; Environmental</option>
      <option value="S">S &mdash; Social</option>
      <option value="G">G &mdash; Governance</option>
    </select>
    <label>Question</label>
    <textarea id="newQ" rows="3" placeholder="Enter question text..."></textarea>
    <label>Answer (optional)</label>
    <textarea id="newA" rows="4" placeholder="Enter answer text..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmAdd()">Add</button>
    </div>
  </div>
</div>
<script>var OWNER = 'Rray292';
var REPO  = 'JA-Solar-ESG-answer-pair';
var DATA_FILE = 'data.json';
var data = [];
var fileSha = null;
var dirty = false;
var autoSaveTimer = null;
var activeCat = 'all';
var activeStatus = 'all';
var searchTerm = '';

function getToken() { return localStorage.getItem('esg_gh_token') || null; }
function setSync(msg, cls) {
  var el = document.getElementById('syncStatus');
  el.textContent = msg; el.className = 'sync-status' + (cls ? ' ' + cls : '');
}
function submitToken() {
  var val = document.getElementById('tokenInput').value.trim();
  if (!val) return;
  localStorage.setItem('esg_gh_token', val);
  document.getElementById('tokenModal').classList.remove('open');
  loadData();
}
function logout() { localStorage.removeItem('esg_gh_token'); location.reload(); }

async function loadData() {
  setSync('Loading...', '');
  var token = getToken();
  try {
    var r = await fetch('https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + DATA_FILE,
      {headers: {'Authorization': 'token ' + token}});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var meta = await r.json();
    fileSha = meta.sha;
    var decoded = decodeURIComponent(escape(atob(meta.content.replace(/\n/g, ''))));
    data = JSON.parse(decoded);
    renderAll();
    setSync('Synced ✓', 'ok');
    document.getElementById('saveBtn').disabled = false;
    document.getElementById('saveNote').textContent = 'Ctrl+S to save';
  } catch(e) {
    setSync('Error', 'error');
    document.getElementById('saveNote').textContent = 'Load failed — check token';
    console.error(e);
  }
}

function renderAll() {
  var main = document.querySelector('.main');
  main.innerHTML = '';
  var lastCat = null;
  var rank = 0;
  data.forEach(function(item) {
    if (item.cat !== lastCat) {
      var h = document.createElement('div');
      h.className = 'cat-header cat-' + item.cat;
      h.setAttribute('data-cat', item.cat);
      h.textContent = item.cat === 'E' ? 'E  Environmental' : item.cat === 'S' ? 'S  Social' : 'G  Governance';
      main.appendChild(h);
      lastCat = item.cat;
    }
    rank++;
    main.appendChild(buildCard(item, rank));
  });
  var noRes = document.createElement('div');
  noRes.id = 'noResults'; noRes.className = 'no-results';
  noRes.textContent = 'No matching questions found.';
  main.appendChild(noRes);
  updateProgress();
  applyFilters();
}

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function buildCard(item, rank) {
  var card = document.createElement('div');
  card.className = 'qa-item';
  card.setAttribute('data-id', item.id);
  card.setAttribute('data-cat', item.cat);
  var statusCls = item.status === 'verified' ? 'verified' : 'ai';
  var statusTxt = item.status === 'verified' ? '✅ Verified' : '⏳ Pending';
  card.innerHTML =
    '<div class="qa-header">' +
      '<span class="qa-rank">#' + rank + '</span>' +
      '<span class="cat-badge cat-' + item.cat + '">' + item.cat + '</span>' +
      '<span class="qa-question">' + esc(item.question) + '</span>' +
      '<button class="status-btn ' + statusCls + '" onclick="toggleStatus(' + item.id + ',this)">' + statusTxt + '</button>' +
      '<button class="delete-btn" onclick="deleteQuestion(' + item.id + ')">✕ Delete</button>' +
    '</div>' +
    '<div class="qa-body">' +
      '<div class="qa-hint">(click to edit, Ctrl+S to save)</div>' +
      '<div class="qa-answer" contenteditable="true" oninput="onEdit(' + item.id + ',this)">' + esc(item.answer) + '</div>' +
    '</div>';
  card.querySelector('.qa-header').addEventListener('click', function(e) {
    if (e.target.classList.contains('status-btn') || e.target.classList.contains('delete-btn')) return;
    card.classList.toggle('open');
  });
  return card;
}

function onEdit(id, el) {
  var item = data.find(function(d) { return d.id === id; });
  if (item) item.answer = el.textContent;
  el.classList.add('dirty');
  dirty = true;
  scheduleSave();
}

function toggleStatus(id, btn) {
  var item = data.find(function(d) { return d.id === id; });
  if (!item) return;
  item.status = item.status === 'verified' ? 'pending' : 'verified';
  btn.className = 'status-btn ' + (item.status === 'verified' ? 'verified' : 'ai');
  btn.textContent = item.status === 'verified' ? '✅ Verified' : '⏳ Pending';
  dirty = true; scheduleSave(); updateProgress();
}

function deleteQuestion(id) {
  var item = data.find(function(d) { return d.id === id; });
  if (!item) return;
  if (!confirm('Delete this question?\n\n' + item.question)) return;
  data = data.filter(function(d) { return d.id !== id; });
  dirty = true; renderAll(); saveData();
}

function scheduleSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(function() { if (dirty && fileSha) saveData(); }, 3000);
}

async function saveData() {
  if (!fileSha) return;
  var token = getToken();
  setSync('Saving...', 'saving');
  document.getElementById('saveBtn').disabled = true;
  try {
    var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    var r = await fetch('https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + DATA_FILE, {
      method: 'PUT',
      headers: {'Authorization': 'token ' + token, 'Content-Type': 'application/json'},
      body: JSON.stringify({message: 'Update Q&A', content: encoded, sha: fileSha})
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var result = await r.json();
    fileSha = result.content.sha;
    dirty = false;
    document.querySelectorAll('.qa-answer').forEach(function(el) { el.classList.remove('dirty'); });
    setSync('Saved ✓', 'ok');
    document.getElementById('saveNote').textContent = 'Saved at ' + new Date().toLocaleTimeString();
  } catch(e) {
    setSync('Save failed', 'error');
    console.error(e);
  }
  document.getElementById('saveBtn').disabled = false;
}

function setCatFilter(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.fbtn[data-filter-cat]').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  applyFilters();
}
function toggleStatusFilter(status, btn) {
  if (activeStatus === status) {
    activeStatus = 'all'; btn.classList.remove('active');
  } else {
    activeStatus = status;
    document.querySelectorAll('.f-pending,.f-verified').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  }
  applyFilters();
}
function doSearch(val) { searchTerm = val.toLowerCase(); applyFilters(); }

function applyFilters() {
  var visible = 0;
  document.querySelectorAll('.qa-item').forEach(function(item) {
    var cat = item.getAttribute('data-cat');
    var id = parseInt(item.getAttribute('data-id'));
    var d = data.find(function(x) { return x.id === id; }) || {};
    var q = (item.querySelector('.qa-question') || {}).textContent || '';
    var a = (item.querySelector('.qa-answer') || {}).textContent || '';
    var show = true;
    if (activeCat !== 'all' && cat !== activeCat) show = false;
    if (activeStatus === 'pending' && d.status === 'verified') show = false;
    if (activeStatus === 'verified' && d.status !== 'verified') show = false;
    if (searchTerm && !q.toLowerCase().includes(searchTerm) && !a.toLowerCase().includes(searchTerm)) show = false;
    item.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
  document.querySelectorAll('.cat-header').forEach(function(h) {
    if (activeCat !== 'all') { h.style.display = 'none'; return; }
    var hasVisible = false;
    var sib = h.nextElementSibling;
    while (sib && !sib.classList.contains('cat-header') && sib.id !== 'noResults') {
      if (!sib.classList.contains('hidden')) { hasVisible = true; break; }
      sib = sib.nextElementSibling;
    }
    h.style.display = hasVisible ? '' : 'none';
  });
}

function updateProgress() {
  var total = data.length;
  var verified = data.filter(function(d) { return d.status === 'verified'; }).length;
  var pct = total > 0 ? Math.round(verified / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = verified + ' / ' + total + ' verified';
}

function openAddModal() { document.getElementById('addModal').classList.add('open'); }
function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
  document.getElementById('newQ').value = '';
  document.getElementById('newA').value = '';
}
function confirmAdd() {
  var q = document.getElementById('newQ').value.trim();
  var a = document.getElementById('newA').value.trim();
  var cat = document.getElementById('newCat').value;
  if (!q) { alert('Please enter a question.'); return; }
  var maxId = data.reduce(function(m, d) { return Math.max(m, d.id); }, 0);
  data.push({id: maxId + 1, cat: cat, question: q, status: 'pending', answer: a});
  dirty = true; scheduleSave(); renderAll(); closeAddModal();
}

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveData(); }
});
window.addEventListener('beforeunload', function(e) {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});

if (!getToken()) {
  document.getElementById('tokenModal').classList.add('open');
} else {
  loadData();
}</script>
</body>
</html>
